<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilal Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff); /* S'adapte au thème de Telegram */
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
        }
        button {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ Hilal AI Mini App</h1>
        <p>Bienvenue, <span id="username" style="font-weight: bold;">Visiteur</span> !</p>
        <p>Ceci est votre espace visuel optimisé.</p>
        <button id="closeBtn">Fermer la Mini App</button>
    </div>

    <script>
        // 2. Initialiser l'application Telegram
        const tg = window.Telegram.WebApp;
        tg.expand(); // Ouvre la Mini App en plein écran automatique

        // 3. Récupérer les données de l'utilisateur Telegram
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
        }

        // 4. Action du bouton Fermer
        document.getElementById('closeBtn').addEventListener('click', () => {
            tg.close(); // Ferme proprement la fenêtre de la Mini App
        });
    </script>
</body>
</html>
